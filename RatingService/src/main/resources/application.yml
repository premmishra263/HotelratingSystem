server:
  port: 8083

spring:
  application:
    name: RATING-SERVICE

  data:
    mongodb:
      host: localhost
      port: 27017
      database: Rating   # ← Matches Compass exactly

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
